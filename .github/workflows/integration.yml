name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Paycrest API base URL"
        required: false
        default: "https://api.paycrest.io/v2"
        type: string

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PAYCREST_BASE_URL: ${{ inputs.base_url }}
      PAYCREST_SENDER_API_KEY: ${{ secrets.PAYCREST_SENDER_API_KEY }}
      PAYCREST_PROVIDER_API_KEY: ${{ secrets.PAYCREST_PROVIDER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache-dependency-path: sdks/go/go.sum

      - name: Configure go1.26.0 shim for integration scripts
        run: |
          echo '#!/usr/bin/env bash' > /tmp/go1.26.0
          echo 'exec go "$@"' >> /tmp/go1.26.0
          chmod +x /tmp/go1.26.0
          sudo mv /tmp/go1.26.0 /usr/local/bin/go1.26.0
          go1.26.0 version

      - name: Set up Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy --toolchain stable

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, curl, zip, bcmath, intl
          tools: composer

      - name: Run SDK live integration suite
        run: ./scripts/tests/run_all_integration.sh
