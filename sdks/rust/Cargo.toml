[package]
name = "paycrest-sdk"
version = "2.0.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Official Paycrest Sender SDK v2 for Rust"

[dependencies]
hex = "0.4"
hmac = "0.12"
reqwest = { version = "=0.11.24", default-features = false, features = ["json", "rustls-tls"] }
indexmap = "=2.2.6"
url = "=2.4.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "1"
tokio = { version = "=1.36.0", features = ["rt-multi-thread", "macros"] }
